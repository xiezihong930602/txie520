<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMU自动上架工作台</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #e17055;
            --bg: #0f0f23;
            --card: #1a1a2e;
            --border: #2d2d44;
            --text: #e0e0e0;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Header */
        .header {
            background: linear-gradient(135deg, #2d1b69 0%, #1a0533 100%);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header h1 { font-size: 18px; font-weight: 600; background: linear-gradient(90deg, #a29bfe, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .server-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            display: inline-block;
            animation: none;
        }
        .server-dot.online { background: var(--success); }
        .server-dot.offline { background: var(--danger); }
        .server-dot.checking { background: var(--warning); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .server-status { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }

        /* Buttons */
        .btn {
            padding: 8px 20px; border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all .2s; display: flex; align-items: center; gap: 6px;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.5); }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #7c6ff7; transform: translateY(-1px); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover:not(:disabled) { background: #00d2a0; transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover:not(:disabled) { background: #f08a70; transform: translateY(-1px); }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.05); }

        /* Main Layout */
        .main { flex: 1; display: flex; gap: 0; overflow: hidden; }
        .sidebar { width: 280px; padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; border-right: 1px solid var(--border); flex-shrink: 0; }
        .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }
        .card h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-item { text-align: center; padding: 8px 4px; border-radius: 8px; background: rgba(255,255,255,0.03); }
        .stat-num { font-size: 22px; font-weight: 700; }
        .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
        .stat-item.total .stat-num { color: #a29bfe; }
        .stat-item.pending .stat-num { color: var(--warning); }
        .stat-item.success .stat-num { color: var(--success); }
        .stat-item.fail .stat-num { color: var(--danger); }

        /* Progress */
        .progress-bar {
            height: 4px; background: var(--border); border-radius: 2px;
            margin-top: 8px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 2px; transition: width .3s;
            width: 0%;
        }

        /* Steps */
        .step-list { list-style: none; font-size: 12px; color: var(--text); line-height: 1.8; }
        .step-list li { display: flex; align-items: center; gap: 8px; }
        .step-num {
            width: 18px; height: 18px; background: var(--primary);
            color: #fff; border-radius: 50%; font-size: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .step-num.done { background: var(--success); }

        /* Log Panel */
        .log-container {
            flex: 1;
            background: #0a0a16;
            border-bottom: 1px solid var(--border);
            padding: 12px 16px 8px;
            display: flex;
            flex-direction: column;
            min-height: 150px;
            max-height: 35vh;
        }
        .log-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .log-header span { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .log-panel {
            flex: 1;
            overflow-y: auto;
            font-family: 'Cascadia Code', Consolas, Monaco, monospace;
            font-size: 11px;
            line-height: 1.5;
            color: #a0a0b0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-panel .line { padding: 1px 0; }
        .log-panel .line.success { color: #00d2a0; }
        .log-panel .line.error { color: #e17055; }
        .log-panel .line.info { color: #6c9eff; }
        .log-panel .line.warn { color: #fdcb6e; }

        /* Iframe Container */
        .iframe-container {
            flex: 1;
            background: var(--card);
            display: flex;
            flex-direction: column;
            min-height: 200px;
        }
        .iframe-header {
            padding: 8px 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: var(--muted);
        }
        .iframe-container iframe { flex: 1; width: 100%; border: none; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            padding: 12px 20px; border-radius: 8px; font-size: 13px;
            max-width: 360px; animation: slideIn .3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.success { background: #00b894; color: #fff; }
        .toast.error { background: #e17055; color: #fff; }
        .toast.info { background: #6c5ce7; color: #fff; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Task status badge */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .status-badge.idle { background: rgba(255,255,255,0.05); color: var(--muted); }
        .status-badge.running { background: rgba(108,92,231,0.15); color: #a29bfe; }
        .status-badge.running::before { content: ""; width: 6px; height: 6px; background: #a29bfe; border-radius: 50%; animation: pulse 1s infinite; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>🤖 TEMU 自动上架工作台</h1>
            <div class="server-status">
                <span class="server-dot checking" id="serverDot"></span>
                <span id="serverLabel">检测中...</span>
            </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="btn btn-ghost" onclick="location.reload()" title="刷新页面">🔄</button>
            <button class="btn btn-ghost" id="btnStop" onclick="stopTask()" disabled>⏹ 停止</button>
            <button class="btn btn-primary" id="btnSync" onclick="startSync()">📷 转存图片</button>
            <button class="btn btn-success" id="btnPublish" onclick="startPublish()">🚀 开始上架</button>
        </div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="card">
                <h3>📊 数据概览</h3>
                <div class="stats-grid">
                    <div class="stat-item total"><div class="stat-num" id="statTotal">-</div><div class="stat-label">商品总数</div></div>
                    <div class="stat-item pending"><div class="stat-num" id="statPending">-</div><div class="stat-label">待上架</div></div>
                    <div class="stat-item success"><div class="stat-num" id="statSuccess">-</div><div class="stat-label">已上架</div></div>
                    <div class="stat-item fail"><div class="stat-num" id="statFail">-</div><div class="stat-label">失败</div></div>
                </div>
                <button class="btn btn-ghost" style="width:100%;margin-top:8px;font-size:11px;padding:6px;" onclick="loadStats()">🔄 刷新统计</button>
            </div>

            <div class="card">
                <h3>⚡ 任务状态</h3>
                <div style="text-align:center;padding:4px 0;">
                    <span class="status-badge idle" id="taskStatus">空闲中</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px;" id="progressText"></div>
            </div>

            <div class="card">
                <h3>📋 流程</h3>
                <ul class="step-list">
                    <li><span class="step-num">1</span> 飞书表格填数据</li>
                    <li><span class="step-num">2</span> 颜色明细传附件</li>
                    <li><span class="step-num">3</span> 转存图片到公网</li>
                    <li><span class="step-num">4</span> 一键开始上架</li>
                    <li><span class="step-num">5</span> 自动回填结果</li>
                </ul>
            </div>
        </div>

        <div class="content">
            <div class="log-container">
                <div class="log-header">
                    <span>📝 运行日志</span>
                    <button class="btn btn-ghost" style="font-size:10px;padding:2px 8px;" onclick="clearLog()">清空</button>
                </div>
                <div class="log-panel" id="logPanel"></div>
            </div>
            <div class="iframe-container">
                <div class="iframe-header">
                    <span>📊 飞书数据中台</span>
                    <span style="font-size:10px;color:var(--muted)">实时查看 & 编辑数据</span>
                </div>
                <iframe src="https://my.feishu.cn/base/Z69Pb8Zpua8h3PsKiumcidJ0nEg"></iframe>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        const API = "http://127.0.0.1:8765";
        let polling = false;
        let pollTimer = null;
        let outputLinesShown = 0;

        // ====== Helpers ======
        function log(text, type) {
            type = type || "";
            const panel = document.getElementById("logPanel");
            const line = document.createElement("div");
            line.className = "line " + type;
            line.textContent = text;
            panel.appendChild(line);
            panel.scrollTop = panel.scrollHeight;
        }

        function clearLog() {
            document.getElementById("logPanel").innerHTML = "";
            outputLinesShown = 0;
        }

        function toast(text, type) {
            const container = document.getElementById("toastContainer");
            const el = document.createElement("div");
            el.className = "toast " + (type || "info");
            el.textContent = text;
            container.appendChild(el);
            setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity .3s"; setTimeout(() => el.remove(), 300); }, 3000);
        }

        function setStatus(running) {
            const status = document.getElementById("taskStatus");
            const btnSync = document.getElementById("btnSync");
            const btnPublish = document.getElementById("btnPublish");
            const btnStop = document.getElementById("btnStop");
            const progress = document.getElementById("progressFill");
            const progressText = document.getElementById("progressText");

            if (running) {
                status.textContent = "运行中...";
                status.className = "status-badge running";
                btnSync.disabled = true;
                btnPublish.disabled = true;
                btnStop.disabled = false;
                progress.style.width = "30%";
                progressText.textContent = "执行中...";
            } else {
                status.textContent = "空闲中";
                status.className = "status-badge idle";
                btnSync.disabled = false;
                btnPublish.disabled = false;
                btnStop.disabled = true;
                progress.style.width = "0%";
                progressText.textContent = "";
            }
        }

        function updateProgress(pct, text) {
            document.getElementById("progressFill").style.width = pct + "%";
            document.getElementById("progressText").textContent = text || "";
        }

        // ====== Server Health Check ======
        async function checkServer() {
            const dot = document.getElementById("serverDot");
            const label = document.getElementById("serverLabel");
            dot.className = "server-dot checking";
            label.textContent = "检测中...";
            try {
                const res = await fetch(API + "/api/stats", { signal: AbortSignal.timeout(3000) });
                if (res.ok) {
                    dot.className = "server-dot online";
                    label.textContent = "服务在线";
                    loadStats();
                } else {
                    throw new Error("fail");
                }
            } catch (e) {
                dot.className = "server-dot offline";
                label.textContent = "服务离线 - 请启动 workbench_server.py";
            }
        }

        // ====== Stats ======
        async function loadStats() {
            try {
                const res = await fetch(API + "/api/stats", { signal: AbortSignal.timeout(5000) });
                const data = await res.json();
                document.getElementById("statTotal").textContent = data.total || 0;
                document.getElementById("statPending").textContent = data.pending || 0;
                document.getElementById("statSuccess").textContent = data.success || 0;
                document.getElementById("statFail").textContent = data.fail || 0;
                document.getElementById("serverDot").className = "server-dot online";
                document.getElementById("serverLabel").textContent = "服务在线";
            } catch (e) {
                document.getElementById("serverDot").className = "server-dot offline";
                document.getElementById("serverLabel").textContent = "服务离线";
            }
        }

        // ====== Polling ======
        function pollStatus() {
            if (polling) return;
            polling = true;
            pollTimer = setInterval(async function() {
                try {
                    const res = await fetch(API + "/api/status", { signal: AbortSignal.timeout(3000) });
                    const data = await res.json();
                    const newLines = data.output.slice(outputLinesShown);
                    outputLinesShown += newLines.length;
                    newLines.forEach(function(line) {
                        let type = "";
                        if (line.includes("失败") || line.includes("错误") || line.includes("error")) type = "error";
                        else if (line.includes("成功") || line.includes("OK") || line.includes("完成")) type = "success";
                        else if (line.includes("====")) type = "info";
                        else if (line.includes("警告")) type = "warn";
                        log(line, type);
                        // Progress heuristic
                        if (line.includes("[1/")) updateProgress(10, line.trim());
                        if (line.includes("尺码")) updateProgress(50, "处理尺码中...");
                        if (line.includes("重量")) updateProgress(80, "设置重量中...");
                        if (line.includes("上架成功")) updateProgress(100, "完成!");
                    });
                    if (!data.running) {
                        stopPolling();
                        setStatus(false);
                        updateProgress(100, "任务结束");
                        log("=== 任务结束 ===", "info");
                        setTimeout(() => { updateProgress(0, ""); loadStats(); }, 2000);
                    }
                } catch (e) {
                    stopPolling();
                    setStatus(false);
                }
            }, 600);
        }

        function stopPolling() {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
            polling = false;
        }

        // ====== Actions ======
        async function startSync() {
            clearLog();
            log("=== 开始转存图片 ===", "info");
            setStatus(true);
            outputLinesShown = 0;
            try {
                const res = await fetch(API + "/api/sync", { method: "POST" });
                const data = await res.json();
                if (data.ok) { log(data.msg); pollStatus(); }
                else { log("启动失败: " + data.msg, "error"); setStatus(false); toast("同步启动失败", "error"); }
            } catch (e) {
                log("连接失败，请确认工作台服务已启动", "error");
                setStatus(false);
                toast("无法连接到后台服务", "error");
            }
        }

        async function startPublish() {
            clearLog();
            log("=== 开始批量上架 ===", "info");
            setStatus(true);
            outputLinesShown = 0;
            try {
                const res = await fetch(API + "/api/publish", { method: "POST" });
                const data = await res.json();
                if (data.ok) { log(data.msg); pollStatus(); }
                else { log("启动失败: " + data.msg, "error"); setStatus(false); toast("上架启动失败", "error"); }
            } catch (e) {
                log("连接失败，请确认工作台服务已启动", "error");
                setStatus(false);
                toast("无法连接到后台服务", "error");
            }
        }

        async function stopTask() {
            try { await fetch(API + "/api/stop", { method: "POST" }); } catch(e){}
            stopPolling();
            setStatus(false);
            log("=== 任务已停止 ===", "warn");
            toast("任务已停止", "info");
        }

        // ====== Init ======
        checkServer();
        setInterval(checkServer, 15000);
        setInterval(loadStats, 60000);
    </script>
</body>
</html>
